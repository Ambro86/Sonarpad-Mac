name: Build macOS App and DMG

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: macos-14
            rust_target: aarch64-apple-darwin
            pdfium_archive: pdfium-mac-arm64.tgz
            dmg_name: Sonarpad-macOS-AppleSilicon.dmg
            artifact_name: sonarpad-macos-dmg-apple-silicon
          - runs_on: macos-15-intel
            rust_target: x86_64-apple-darwin
            pdfium_archive: pdfium-mac-x64.tgz
            dmg_name: Sonarpad-macOS-Intel.dmg
            artifact_name: sonarpad-macos-dmg-intel
    runs-on: ${{ matrix.runs_on }}
    env:
      CMAKE_ARGS: -DwxUSE_OPENGL=OFF
      CURL_CFFI_VERSION: "0.7.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode and SDK
        shell: bash
        run: |
          set -euxo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            DEVELOPER_DIR="$(dirname "$(dirname "$(xcode-select -p)")")"
          fi
          echo "Using DEVELOPER_DIR=${DEVELOPER_DIR}"
          sudo xcode-select -switch "${DEVELOPER_DIR}"
          xcodebuild -version
          echo "DEVELOPER_DIR=${DEVELOPER_DIR}" >> "${GITHUB_ENV}"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "${GITHUB_ENV}"

      - name: Ensure build tools (cmake + ninja + nasm)
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja nasm
          cmake --version
          ninja --version
          nasm -v

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Cache macOS pdfium
        uses: actions/cache@v4
        with:
          path: dist/pdfium
          key: ${{ runner.os }}-${{ matrix.rust_target }}-pdfium-${{ matrix.pdfium_archive }}-v1

      - name: Cache macOS ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            dist/ffmpeg-src
            dist/ffmpeg-install
          key: ${{ runner.os }}-${{ matrix.rust_target }}-ffmpeg-8.0.1-v1

      - name: Cache macOS curl-cffi
        uses: actions/cache@v4
        with:
          path: dist/curl-cffi
          key: ${{ runner.os }}-${{ matrix.rust_target }}-curl-cffi-v1

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Download pdfium for macOS
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/pdfium
          PDFIUM_DYLIB="$(find dist/pdfium -type f -name 'libpdfium.dylib' | head -n 1 || true)"
          if [ -z "${PDFIUM_DYLIB}" ]; then
            rm -rf dist/pdfium/*
            curl -L --fail \
              "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${{ matrix.pdfium_archive }}" \
              -o "dist/pdfium/${{ matrix.pdfium_archive }}"
            tar -xzf "dist/pdfium/${{ matrix.pdfium_archive }}" -C dist/pdfium
            PDFIUM_DYLIB="$(find dist/pdfium -type f -name 'libpdfium.dylib' | head -n 1)"
          fi
          PDFIUM_DYLIB="$(find dist/pdfium -type f -name 'libpdfium.dylib' | head -n 1)"
          test -n "${PDFIUM_DYLIB}"
          echo "PDFIUM_DYLIB=${PDFIUM_DYLIB}" >> "${GITHUB_ENV}"

      - name: Build bundled ffmpeg from source
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/ffmpeg-src dist/ffmpeg-build dist/ffmpeg-install
          if [ -x "dist/ffmpeg-install/bin/ffmpeg" ]; then
            "dist/ffmpeg-install/bin/ffmpeg" -version
            exit 0
          fi
          rm -rf dist/ffmpeg-build dist/ffmpeg-install
          mkdir -p dist/ffmpeg-build dist/ffmpeg-install
          if [ ! -f "dist/ffmpeg-src/ffmpeg-8.0.1.tar.xz" ]; then
            curl -L --fail \
              "https://ffmpeg.org/releases/ffmpeg-8.0.1.tar.xz" \
              -o "dist/ffmpeg-src/ffmpeg-8.0.1.tar.xz"
          fi
          tar -xf "dist/ffmpeg-src/ffmpeg-8.0.1.tar.xz" -C dist/ffmpeg-build
          cd "dist/ffmpeg-build/ffmpeg-8.0.1"
          if [ "${{ matrix.rust_target }}" = "aarch64-apple-darwin" ]; then
            FFMPEG_ARCH="arm64"
          else
            FFMPEG_ARCH="x86_64"
          fi
          ./configure \
            --prefix="$(pwd)/../../ffmpeg-install" \
            --cc=clang \
            --arch="${FFMPEG_ARCH}" \
            --target-os=darwin \
            --disable-everything \
            --disable-autodetect \
            --disable-avdevice \
            --disable-swscale \
            --disable-network \
            --disable-iconv \
            --disable-bzlib \
            --disable-lzma \
            --disable-sdl2 \
            --disable-securetransport \
            --disable-videotoolbox \
            --disable-audiotoolbox \
            --disable-debug \
            --disable-doc \
            --disable-programs \
            --enable-ffmpeg \
            --disable-shared \
            --enable-static \
            --enable-protocol=file \
            --enable-demuxer=mov \
            --enable-demuxer=mp3 \
            --enable-muxer=ipod \
            --enable-muxer=mp4 \
            --enable-parser=mpegaudio \
            --enable-decoder=aac \
            --enable-decoder=mp3 \
            --enable-encoder=aac \
            --enable-filter=atrim \
            --enable-filter=aresample \
            --enable-filter=anull
          make -j"$(sysctl -n hw.ncpu)"
          make install
          "../../ffmpeg-install/bin/ffmpeg" -version
          otool -L "../../ffmpeg-install/bin/ffmpeg"

      - name: Download curl-impersonate for macOS
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/curl-cffi
          if ! find "dist/curl-cffi" -type f -name '*.whl' | grep . >/dev/null; then
            rm -rf dist/curl-cffi/*
            python3 -m pip download \
              --no-deps \
              --only-binary=:all: \
              --dest dist/curl-cffi \
              "curl_cffi==${CURL_CFFI_VERSION}"
          fi
          python3 - <<'PY'
          import zipfile
          from pathlib import Path

          wheel_path = next(Path("dist/curl-cffi").glob("*.whl"))
          extract_dir = Path("dist/curl-cffi/extracted")
          extract_dir.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile(wheel_path) as wheel:
              wheel.extractall(extract_dir)
          dylibs = sorted(str(path) for path in extract_dir.rglob("*.dylib"))
          if not dylibs:
              raise SystemExit("No .dylib files found inside curl_cffi wheel")
          print("Extracted dylibs:")
          for dylib in dylibs:
              print(dylib)
          PY

      - name: Package .app and .dmg
        shell: bash
        run: |
          set -euxo pipefail

          APP_NAME="Sonarpad"
          BIN_NAME="sonarpad-minimal"
          STAGE_DIR="dist/stage"
          APP_DIR="${STAGE_DIR}/${APP_NAME}.app"
          CONTENTS_DIR="${APP_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"
          FRAMEWORKS_DIR="${CONTENTS_DIR}/Frameworks"
          RESOURCES_DIR="${CONTENTS_DIR}/Resources"
          FFMPEG_DIR="${RESOURCES_DIR}/ffmpeg"
          FFMPEG_BIN_DIR="${FFMPEG_DIR}/bin"
          FFMPEG_LIB_DIR="${FFMPEG_DIR}/lib"

          rm -rf "${APP_DIR}" "${FFMPEG_DIR}"
          mkdir -p "${MACOS_DIR}" "${FRAMEWORKS_DIR}" "${RESOURCES_DIR}" "${FFMPEG_BIN_DIR}" "${FFMPEG_LIB_DIR}"
          cp "target/${{ matrix.rust_target }}/release/${BIN_NAME}" "${MACOS_DIR}/${APP_NAME}"
          chmod +x "${MACOS_DIR}/${APP_NAME}"
          cp "${PDFIUM_DYLIB}" "${FRAMEWORKS_DIR}/libpdfium.dylib"
          chmod +x "${FRAMEWORKS_DIR}/libpdfium.dylib"
          find "dist/curl-cffi/extracted" -type f -name '*.dylib' -print0 | while IFS= read -r -d '' dylib; do
            dylib_name="$(basename "${dylib}")"
            cp "${dylib}" "${FRAMEWORKS_DIR}/${dylib_name}"
            chmod +x "${FRAMEWORKS_DIR}/${dylib_name}"
          done
          cp "dist/ffmpeg-install/bin/ffmpeg" "${FFMPEG_BIN_DIR}/ffmpeg"
          chmod +x "${FFMPEG_BIN_DIR}/ffmpeg"
          otool -L "${FFMPEG_BIN_DIR}/ffmpeg"

          cat > "${CONTENTS_DIR}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Sonarpad</string>
            <key>CFBundleDisplayName</key>
            <string>Sonarpad</string>
            <key>CFBundleIdentifier</key>
            <string>com.sonarpad.minimal</string>
          <key>CFBundleVersion</key>
          <string>0.2.1</string>
          <key>CFBundleShortVersionString</key>
          <string>0.2.1</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>Sonarpad</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoadsForMedia</key>
              <true/>
            </dict>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # Ad-hoc sign the bundle so the generated app has a valid code signature structure.
          # This is not notarization, but avoids shipping an unsigned/invalid bundle.
          codesign --force --deep --sign - "${APP_DIR}"

          # Bundle validity checks (fail workflow if malformed).
          plutil -lint "${CONTENTS_DIR}/Info.plist"
          codesign --verify --deep --strict --verbose=2 "${APP_DIR}"

      - name: Smoke test app launch
        shell: bash
        run: |
          set -euxo pipefail
          APP_BIN="dist/stage/Sonarpad.app/Contents/MacOS/Sonarpad"
          LOG_FILE="$(mktemp)"
          "${APP_BIN}" >"${LOG_FILE}" 2>&1 &
          APP_PID=$!
          sleep 5
          if ! kill -0 "${APP_PID}" 2>/dev/null; then
            echo "App exited too early during smoke test."
            cat "${LOG_FILE}"
            exit 1
          fi
          kill "${APP_PID}" || true
          wait "${APP_PID}" 2>/dev/null || true
          sleep 2

      - name: Package DMG
        shell: bash
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          STAGE_DIR="dist/stage"
          DMG_SRC_DIR="dist/dmg-src"
          DMG_PATH="dist/${{ matrix.dmg_name }}"
          TMP_DMG_PATH="dist/${{ matrix.artifact_name }}-tmp.dmg"
          mkdir -p dist
          rm -f "${DMG_PATH}" "${TMP_DMG_PATH}"
          hdiutil detach "/Volumes/${APP_NAME}" -force 2>/dev/null || true
          sleep 2
          rm -rf "${DMG_SRC_DIR}"
          mkdir -p "${DMG_SRC_DIR}"
          cp -R "${STAGE_DIR}/${APP_NAME}.app" "${DMG_SRC_DIR}/"
          lsof +D "${DMG_SRC_DIR}" || true
          for attempt in 1 2; do
            if hdiutil create -volname "${APP_NAME}" -srcfolder "${DMG_SRC_DIR}" -ov -format UDZO "${TMP_DMG_PATH}"; then
              mv -f "${TMP_DMG_PATH}" "${DMG_PATH}"
              exit 0
            fi
            if [ "${attempt}" -eq 2 ]; then
              exit 1
            fi
            rm -f "${TMP_DMG_PATH}"
            hdiutil detach "/Volumes/${APP_NAME}" -force 2>/dev/null || true
            sleep 3
          done

      - name: Validate DMG structure
        shell: bash
        run: |
          set -euxo pipefail
          DMG_PATH="dist/${{ matrix.dmg_name }}"
          MOUNT_DIR="$(mktemp -d)"
          hdiutil attach "${DMG_PATH}" -mountpoint "${MOUNT_DIR}" -nobrowse -quiet
          test -d "${MOUNT_DIR}/Sonarpad.app"
          test -f "${MOUNT_DIR}/Sonarpad.app/Contents/Frameworks/libpdfium.dylib"
          test -f "${MOUNT_DIR}/Sonarpad.app/Contents/Resources/ffmpeg/bin/ffmpeg"
          find "${MOUNT_DIR}/Sonarpad.app/Contents/Frameworks" -type f -name 'libcurl*.dylib' | grep .
          codesign --verify --deep --strict --verbose=2 "${MOUNT_DIR}/Sonarpad.app"
          hdiutil detach "${MOUNT_DIR}" -quiet

      - name: Upload artifacts (attempt 1)
        id: upload_artifact_attempt_1
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.dmg_name }}

      - name: Upload artifacts (attempt 2)
        id: upload_artifact_attempt_2
        if: steps.upload_artifact_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.dmg_name }}

      - name: Upload artifacts (attempt 3)
        if: steps.upload_artifact_attempt_1.outcome == 'failure' && steps.upload_artifact_attempt_2.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.dmg_name }}


