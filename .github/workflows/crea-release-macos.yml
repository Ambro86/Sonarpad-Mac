name: Create Release (macOS)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create Release from Latest DMG Artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("Cargo.toml").read_text(encoding="utf-8"))
          version = data["package"]["version"]
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"RELEASE_VERSION=v{version}\n")
          PY

      - name: Get latest successful macOS build runs
        id: get_runs
        uses: actions/github-script@v7
        with:
          script: |
            const mainRuns = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'macos-app-dmg.yml',
              status: 'completed',
              conclusion: 'success',
              per_page: 1
            });

            if (mainRuns.data.workflow_runs.length === 0) {
              core.setFailed('No successful macOS build workflow run found');
              return;
            }

            const latestMainRun = mainRuns.data.workflow_runs[0];
            core.setOutput('main_run_id', latestMainRun.id);
            core.setOutput('main_run_sha', latestMainRun.head_sha.substring(0, 7));

            const catalinaRuns = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'macos-app-dmg-catalina.yml',
              status: 'completed',
              conclusion: 'success',
              per_page: 1
            });

            if (catalinaRuns.data.workflow_runs.length === 0) {
              core.setFailed('No successful macOS Catalina build workflow run found');
              return;
            }

            const latestCatalinaRun = catalinaRuns.data.workflow_runs[0];
            core.setOutput('catalina_run_id', latestCatalinaRun.id);
            core.setOutput('catalina_run_sha', latestCatalinaRun.head_sha.substring(0, 7));

      - name: Download artifacts from latest main macOS build
        uses: actions/download-artifact@v4
        with:
          pattern: sonarpad-macos-*
          run-id: ${{ steps.get_runs.outputs.main_run_id }}
          path: ./release_files
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Catalina artifacts from latest Catalina build
        uses: actions/download-artifact@v4
        with:
          pattern: sonarpad-macos-*-intel-catalina
          run-id: ${{ steps.get_runs.outputs.catalina_run_id }}
          path: ./release_files
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release files
        run: |
          set -euo pipefail
          ls -la ./release_files
          dmg_count=$(find ./release_files -maxdepth 1 -type f -name "*.dmg" | wc -l)
          zip_count=$(find ./release_files -maxdepth 1 -type f -name "*.zip" | wc -l)
          if [ "$dmg_count" -eq 0 ] || [ "$zip_count" -eq 0 ]; then
            echo "ERROR: expected both .dmg and .zip release files"
            exit 1
          fi

      - name: Create release (if missing)
        run: |
          if gh release view "${{ env.RELEASE_VERSION }}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_VERSION} already exists. Skipping creation."
          else
            release_notes=$'Main macOS build run: ${{ steps.get_runs.outputs.main_run_id }} (${{ steps.get_runs.outputs.main_run_sha }})\n\nCatalina macOS build run: ${{ steps.get_runs.outputs.catalina_run_id }} (${{ steps.get_runs.outputs.catalina_run_sha }})'
            gh release create "${{ env.RELEASE_VERSION }}" \
              --title "Sonarpad Release ${{ env.RELEASE_VERSION }}" \
              --notes "$release_notes"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release files
        run: |
          set -euo pipefail
          for file in ./release_files/*.{dmg,zip}; do
            [ -f "$file" ] || continue
            echo "Uploading $(basename "$file")"
            gh release upload "${{ env.RELEASE_VERSION }}" "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

