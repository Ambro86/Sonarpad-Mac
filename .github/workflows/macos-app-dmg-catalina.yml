name: Build macOS Catalina Intel App and DMG

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos-catalina:
    runs-on: macos-15-intel
    env:
      CMAKE_ARGS: -DwxUSE_OPENGL=OFF
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"
      CFLAGS: -mmacosx-version-min=10.15
      CXXFLAGS: -mmacosx-version-min=10.15
      LDFLAGS: -mmacosx-version-min=10.15
      FFMPEG_VERSION: "8.0.1"
      CURL_CFFI_VERSION: "0.7.0"
      SONARPAD_MACOS_BUILD_FLAVOR: intel-catalina

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode and SDK
        shell: bash
        run: |
          set -euxo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            DEVELOPER_DIR="$(dirname "$(dirname "$(xcode-select -p)")")"
          fi
          echo "Using DEVELOPER_DIR=${DEVELOPER_DIR}"
          sudo xcode-select -switch "${DEVELOPER_DIR}"
          xcodebuild -version
          echo "DEVELOPER_DIR=${DEVELOPER_DIR}" >> "${GITHUB_ENV}"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "${GITHUB_ENV}"

      - name: Ensure build tools (cmake + ninja + nasm)
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja nasm
          cmake --version
          ninja --version
          nasm -v

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Cache Catalina pdfium
        uses: actions/cache@v4
        with:
          path: dist/pdfium
          key: ${{ runner.os }}-catalina-pdfium-v3

      - name: Cache Catalina ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            dist/ffmpeg-src
            dist/ffmpeg-install
          key: ${{ runner.os }}-catalina-ffmpeg-${{ env.FFMPEG_VERSION }}-v11

      - name: Build release binary
        shell: bash
        run: |
          set -euxo pipefail
          cargo build --release --target x86_64-apple-darwin

      - name: Download Catalina-compatible pdfium for macOS Intel
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/pdfium

          version_le() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | head -n 1)" = "$1" ]
          }

          check_max_macos_version() {
            local binary="$1"
            local max_supported="$2"
            local output
            local found_version
            output="$(vtool -show-build "${binary}" 2>/dev/null || true)"
            echo "${output}"
            found_version="$(
              echo "${output}" | sed -n 's/.*minos \([0-9][0-9.]*\).*/\1/p' | head -n 1
            )"
            if [ -z "${found_version}" ]; then
              found_version="$(
                echo "${output}" | sed -n 's/.*version \([0-9][0-9.]*\).*/\1/p' | head -n 1
              )"
            fi
            if [ -z "${found_version}" ]; then
              return 1
            fi
            version_le "${found_version}" "${max_supported}"
          }

          cached_dylib="$(find dist/pdfium -type f -name 'libpdfium.dylib' | head -n 1 || true)"
          if [ -n "${cached_dylib}" ] && check_max_macos_version "${cached_dylib}" "10.15"; then
            echo "PDFIUM_DYLIB=${cached_dylib}" >> "${GITHUB_ENV}"
            exit 0
          fi

          rm -rf dist/pdfium/*

          candidate_urls=(
            "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-x64.tgz"
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F6996/pdfium-mac-x64.tgz"
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F6668/pdfium-mac-x64.tgz"
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F6372/pdfium-mac-x64.tgz"
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F6169/pdfium-mac-x64.tgz"
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F5921/pdfium-mac-x64.tgz"
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F5713/pdfium-mac-x64.tgz"
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F5418/pdfium-mac-x64.tgz"
          )

          PDFIUM_DYLIB=""
          for candidate_url in "${candidate_urls[@]}"; do
            archive_path="dist/pdfium/candidate.tgz"
            extract_dir="dist/pdfium/extracted"
            rm -f "${archive_path}"
            rm -rf "${extract_dir}"
            mkdir -p "${extract_dir}"
            if ! curl -L --fail "${candidate_url}" -o "${archive_path}"; then
              continue
            fi
            tar -xzf "${archive_path}" -C "${extract_dir}"
            candidate_dylib="$(find "${extract_dir}" -type f -name 'libpdfium.dylib' | head -n 1)"
            if [ -z "${candidate_dylib}" ]; then
              continue
            fi
            if check_max_macos_version "${candidate_dylib}" "10.15"; then
              PDFIUM_DYLIB="${candidate_dylib}"
              break
            fi
          done

          test -n "${PDFIUM_DYLIB}"
          echo "PDFIUM_DYLIB=${PDFIUM_DYLIB}" >> "${GITHUB_ENV}"

      - name: Build Catalina-compatible ffmpeg from source
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/ffmpeg-src dist/ffmpeg-build dist/ffmpeg-install
          if [ -x "dist/ffmpeg-install/bin/ffmpeg" ]; then
            otool -L "dist/ffmpeg-install/bin/ffmpeg"
            if ! otool -L "dist/ffmpeg-install/bin/ffmpeg" \
              | tail -n +2 \
              | awk '{print $1}' \
              | grep -vE '^(/System/|/usr/lib/|@)'; then
              "dist/ffmpeg-install/bin/ffmpeg" -version
              exit 0
            fi
          fi
          rm -rf dist/ffmpeg-install dist/ffmpeg-build dist/lame-build dist/lame-install
          mkdir -p dist/ffmpeg-build dist/ffmpeg-install dist/lame-src dist/lame-build dist/lame-install
          if [ ! -f "dist/lame-src/lame-3.100.tar.gz" ]; then
            curl -L --fail \
              "https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz" \
              -o "dist/lame-src/lame-3.100.tar.gz"
          fi
          tar -xzf "dist/lame-src/lame-3.100.tar.gz" -C dist/lame-build
          pushd dist/lame-build/lame-3.100
          CFLAGS="-mmacosx-version-min=10.15" \
          CXXFLAGS="-mmacosx-version-min=10.15" \
          LDFLAGS="-mmacosx-version-min=10.15" \
            ./configure \
              --prefix="$(pwd)/../../lame-install" \
              --disable-shared \
              --enable-static \
              --disable-frontend
          make -j"$(sysctl -n hw.ncpu)"
          make install
          popd
          if [ ! -f "dist/ffmpeg-src/ffmpeg-${FFMPEG_VERSION}.tar.xz" ]; then
            curl -L --fail \
              "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz" \
              -o "dist/ffmpeg-src/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          fi
          tar -xf "dist/ffmpeg-src/ffmpeg-${FFMPEG_VERSION}.tar.xz" -C dist/ffmpeg-build
          cd "dist/ffmpeg-build/ffmpeg-${FFMPEG_VERSION}"
          brew install pkg-config
          LAME_PREFIX="$(pwd)/../../lame-install"
          export PKG_CONFIG_PATH="${LAME_PREFIX}/lib/pkgconfig"
          export PKG_CONFIG_ALL_STATIC=1
          ./configure \
            --prefix="$(pwd)/../../ffmpeg-install" \
            --cc=clang \
            --arch=x86_64 \
            --target-os=darwin \
            --pkg-config-flags="--static" \
            --extra-cflags="-mmacosx-version-min=10.15 -I${LAME_PREFIX}/include" \
            --extra-cxxflags="-mmacosx-version-min=10.15" \
            --extra-ldflags="-mmacosx-version-min=10.15 -L${LAME_PREFIX}/lib" \
            --extra-libs="${LAME_PREFIX}/lib/libmp3lame.a" \
            --disable-everything \
            --disable-autodetect \
            --disable-avdevice \
            --disable-swscale \
            --disable-iconv \
            --disable-bzlib \
            --disable-lzma \
            --disable-sdl2 \
            --disable-videotoolbox \
            --disable-audiotoolbox \
            --disable-debug \
            --disable-doc \
            --disable-programs \
            --enable-ffmpeg \
            --disable-shared \
            --enable-static \
            --enable-securetransport \
            --enable-protocol=file \
            --enable-protocol=http \
            --enable-protocol=https \
            --enable-protocol=tcp \
            --enable-protocol=tls \
            --enable-demuxer=hls \
            --enable-demuxer=mpegts \
            --enable-demuxer=mov \
            --enable-demuxer=mp3 \
            --enable-muxer=ipod \
            --enable-muxer=mp3 \
            --enable-muxer=mp4 \
            --enable-gpl \
            --enable-libmp3lame \
            --enable-encoder=libmp3lame \
            --enable-parser=aac \
            --enable-parser=h264 \
            --enable-parser=hevc \
            --enable-parser=mpeg4video \
            --enable-parser=mpegvideo \
            --enable-parser=mpegaudio \
            --enable-decoder=aac \
            --enable-decoder=h264 \
            --enable-decoder=hevc \
            --enable-decoder=mpeg2video \
            --enable-decoder=mpeg4 \
            --enable-decoder=mp3 \
            --enable-encoder=aac \
            --enable-filter=atrim \
            --enable-filter=aresample \
            --enable-filter=anull
          make -j"$(sysctl -n hw.ncpu)"
          make install
          "../../ffmpeg-install/bin/ffmpeg" -version
          otool -L "../../ffmpeg-install/bin/ffmpeg"

      - name: Download curl-impersonate for macOS
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/curl-cffi
          rm -rf dist/curl-cffi/*
          python3 -m pip download \
            --no-deps \
            --only-binary=:all: \
            --dest dist/curl-cffi \
            "curl_cffi==${CURL_CFFI_VERSION}"
          python3 - <<'PY'
          import zipfile
          from pathlib import Path

          wheel_path = next(Path("dist/curl-cffi").glob("*.whl"))
          extract_dir = Path("dist/curl-cffi/extracted")
          extract_dir.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile(wheel_path) as wheel:
              wheel.extractall(extract_dir)
          dylibs = sorted(str(path) for path in extract_dir.rglob("*.dylib"))
          if not dylibs:
              raise SystemExit("No .dylib files found inside curl_cffi wheel")
          print("Extracted dylibs:")
          for dylib in dylibs:
              print(dylib)
          PY
          find "dist/curl-cffi/extracted" -type f -name '*.dylib' -print0 | while IFS= read -r -d '' dylib; do
            echo "===== CURL DYLIB: ${dylib} ====="
            vtool -show-build "${dylib}" || true
            otool -L "${dylib}" || true
          done

      - name: Download bundled mpv.app for macOS Catalina Intel
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/mpv
          rm -rf dist/mpv/*
          curl -L --fail \
            "https://laboratory.stolendata.net/~djinn/mpv_osx/mpv-0.35.0.tar.gz" \
            -o "dist/mpv/mpv.tar.gz"
          tar -xzf "dist/mpv/mpv.tar.gz" -C dist/mpv
          MPV_APP_DIR="$(find dist/mpv -maxdepth 2 -type d -name 'mpv.app' | head -n 1)"
          test -n "${MPV_APP_DIR}"
          test -x "${MPV_APP_DIR}/Contents/MacOS/mpv"
          echo "MPV_APP_DIR=${MPV_APP_DIR}" >> "${GITHUB_ENV}"

      - name: Package .app and .dmg
        shell: bash
        run: |
          set -euxo pipefail

          version_le() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | head -n 1)" = "$1" ]
          }

          check_max_macos_version() {
            local binary="$1"
            local max_supported="$2"
            local output
            local found_version
            output="$(vtool -show-build "${binary}" 2>/dev/null || true)"
            found_version="$(
              echo "${output}" | sed -n 's/.*minos \([0-9][0-9.]*\).*/\1/p' | head -n 1
            )"
            if [ -z "${found_version}" ]; then
              found_version="$(
                echo "${output}" | sed -n 's/.*version \([0-9][0-9.]*\).*/\1/p' | head -n 1
              )"
            fi
            [ -n "${found_version}" ] && version_le "${found_version}" "${max_supported}"
          }

          APP_NAME="Sonarpad"
          BIN_NAME="sonarpad-minimal"
          STAGE_DIR="dist/stage"
          APP_DIR="${STAGE_DIR}/${APP_NAME}.app"
          CONTENTS_DIR="${APP_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"
          FRAMEWORKS_DIR="${CONTENTS_DIR}/Frameworks"
          RESOURCES_DIR="${CONTENTS_DIR}/Resources"
          MPV_APP_DEST="${RESOURCES_DIR}/mpv.app"
          FFMPEG_DIR="${RESOURCES_DIR}/ffmpeg"
          FFMPEG_BIN_DIR="${FFMPEG_DIR}/bin"
          FFMPEG_LIB_DIR="${FFMPEG_DIR}/lib"

          rm -rf "${APP_DIR}" "${FFMPEG_DIR}" "${MPV_APP_DEST}"
          mkdir -p "${MACOS_DIR}" "${FRAMEWORKS_DIR}" "${RESOURCES_DIR}" "${FFMPEG_BIN_DIR}" "${FFMPEG_LIB_DIR}"
          cp "target/x86_64-apple-darwin/release/${BIN_NAME}" "${MACOS_DIR}/${APP_NAME}"
          chmod +x "${MACOS_DIR}/${APP_NAME}"
          cp "${PDFIUM_DYLIB}" "${FRAMEWORKS_DIR}/libpdfium.dylib"
          chmod +x "${FRAMEWORKS_DIR}/libpdfium.dylib"
          find "dist/curl-cffi/extracted" -type f -name '*.dylib' -print0 | while IFS= read -r -d '' dylib; do
            if ! check_max_macos_version "${dylib}" "10.15"; then
              echo "Skipping incompatible Catalina dylib: ${dylib}"
              continue
            fi
            dylib_name="$(basename "${dylib}")"
            cp "${dylib}" "${FRAMEWORKS_DIR}/${dylib_name}"
            chmod +x "${FRAMEWORKS_DIR}/${dylib_name}"
            echo "Copied compatible Catalina dylib: ${dylib_name}"
          done
          cp "dist/ffmpeg-install/bin/ffmpeg" "${FFMPEG_BIN_DIR}/ffmpeg"
          chmod +x "${FFMPEG_BIN_DIR}/ffmpeg"
          otool -L "${FFMPEG_BIN_DIR}/ffmpeg"
          cp -R "${MPV_APP_DIR}" "${MPV_APP_DEST}"
          chmod +x "${MPV_APP_DEST}/Contents/MacOS/mpv"
          curl -L --fail "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" -o "${RESOURCES_DIR}/yt-dlp"
          chmod +x "${RESOURCES_DIR}/yt-dlp"
          cat > "${RESOURCES_DIR}/mpv-input.conf" <<'EOF'
          UP add volume 5
          DOWN add volume -5
          EOF

          cat > "${CONTENTS_DIR}/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Sonarpad</string>
            <key>CFBundleDisplayName</key>
            <string>Sonarpad</string>
            <key>CFBundleIdentifier</key>
            <string>com.sonarpad.minimal</string>
            <key>CFBundleVersion</key>
            <string>0.2.1</string>
            <key>CFBundleShortVersionString</key>
            <string>0.2.1</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>Sonarpad</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoadsForMedia</key>
              <true/>
            </dict>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          codesign --force --deep --sign - "${APP_DIR}"
          plutil -lint "${CONTENTS_DIR}/Info.plist"
          codesign --verify --deep --strict --verbose=2 "${APP_DIR}"

      - name: Smoke test app launch
        shell: bash
        run: |
          set -euxo pipefail
          APP_BIN="dist/stage/Sonarpad.app/Contents/MacOS/Sonarpad"
          LOG_FILE="$(mktemp)"
          "${APP_BIN}" >"${LOG_FILE}" 2>&1 &
          APP_PID=$!
          sleep 5
          if ! kill -0 "${APP_PID}" 2>/dev/null; then
            echo "App exited too early during smoke test."
            cat "${LOG_FILE}"
            exit 1
          fi
          kill "${APP_PID}" || true
          wait "${APP_PID}" 2>/dev/null || true
          sleep 2

      - name: Validate Catalina deployment target
        shell: bash
        run: |
          set -euxo pipefail

          version_le() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | head -n 1)" = "$1" ]
          }

          check_max_macos_version() {
            local binary="$1"
            local max_supported="$2"
            local output
            local found_version
            output="$(vtool -show-build "${binary}" 2>/dev/null || true)"
            echo "${output}"
            found_version="$(
              echo "${output}" | sed -n 's/.*minos \([0-9][0-9.]*\).*/\1/p' | head -n 1
            )"
            if [ -z "${found_version}" ]; then
              found_version="$(
                echo "${output}" | sed -n 's/.*version \([0-9][0-9.]*\).*/\1/p' | head -n 1
              )"
            fi
            if [ -z "${found_version}" ] || ! version_le "${found_version}" "${max_supported}"; then
              echo "Expected macOS deployment <= ${max_supported} for ${binary}"
              exit 1
            fi
          }

          APP_BIN="dist/stage/Sonarpad.app/Contents/MacOS/Sonarpad"
          check_max_macos_version "${APP_BIN}" "10.15"
          check_max_macos_version "dist/stage/Sonarpad.app/Contents/Frameworks/libpdfium.dylib" "10.15"
          check_max_macos_version "dist/stage/Sonarpad.app/Contents/Resources/ffmpeg/bin/ffmpeg" "10.15"
          if otool -L "dist/stage/Sonarpad.app/Contents/Resources/ffmpeg/bin/ffmpeg" \
            | tail -n +2 \
            | awk '{print $1}' \
            | grep -vE '^(/System/|/usr/lib/|@)'; then
            echo "Catalina ffmpeg still has non-system dynamic dependencies"
            exit 1
          fi

          find "dist/stage/Sonarpad.app/Contents/Frameworks" -type f -name '*.dylib' -print0 | \
            while IFS= read -r -d '' dylib; do
              check_max_macos_version "${dylib}" "10.15"
            done

          if [ -d "dist/stage/Sonarpad.app/Contents/Resources/ffmpeg/lib" ]; then
            find "dist/stage/Sonarpad.app/Contents/Resources/ffmpeg/lib" -type f -name '*.dylib' -print0 | \
              while IFS= read -r -d '' dylib; do
                check_max_macos_version "${dylib}" "10.15"
              done
          fi

      - name: Import Developer ID certificate
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euxo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "P12 password length: ${#P12_PASSWORD}"
          shasum -a 256 "$CERTIFICATE_PATH"
          openssl pkcs12 -in "$CERTIFICATE_PATH" -nokeys -passin "pass:$P12_PASSWORD" >/dev/null

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign Sonarpad.app
        shell: bash
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          APP_DIR="dist/stage/${APP_NAME}.app"
          FRAMEWORKS_DIR="${APP_DIR}/Contents/Frameworks"
          FFMPEG_BIN="${APP_DIR}/Contents/Resources/ffmpeg/bin/ffmpeg"
          FFMPEG_LIB_DIR="${APP_DIR}/Contents/Resources/ffmpeg/lib"
          MPV_APP_DIR="${APP_DIR}/Contents/Resources/mpv.app"
          MPV_BIN="${MPV_APP_DIR}/Contents/MacOS/mpv"
          YTDLP_BIN="${APP_DIR}/Contents/Resources/yt-dlp"
          YTDLP_ENTITLEMENTS="dist/ytdlp-entitlements.plist"

          cat > "${YTDLP_ENTITLEMENTS}" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
          </dict>
          </plist>
          PLIST

          if [ -f "${FFMPEG_BIN}" ]; then
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" \
              "${FFMPEG_BIN}"
          fi

          if [ -d "${FFMPEG_LIB_DIR}" ]; then
            find "${FFMPEG_LIB_DIR}" -type f -perm -111 -print0 | while IFS= read -r -d '' bin; do
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" \
                "${bin}"
            done
          fi

          find "${FRAMEWORKS_DIR}" -type f -print0 | while IFS= read -r -d '' bin; do
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" \
              "${bin}"
          done

          if [ -f "${MPV_BIN}" ]; then
            find "${MPV_APP_DIR}" -type f -perm -111 -print0 | while IFS= read -r -d '' bin; do
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" \
                "${bin}"
            done
          fi

          if [ -f "${YTDLP_BIN}" ]; then
            chmod +x "${YTDLP_BIN}"
            xattr -cr "${YTDLP_BIN}" || true
            codesign --force --options runtime --timestamp \
              --entitlements "${YTDLP_ENTITLEMENTS}" \
              --sign "Developer ID Application" \
              "${YTDLP_BIN}"
            codesign --verify --strict --verbose=4 "${YTDLP_BIN}"
          fi

          codesign --force --deep --options runtime --timestamp \
            --sign "Developer ID Application" \
            "${APP_DIR}"

          if [ -f "${YTDLP_BIN}" ]; then
            codesign --force --options runtime --timestamp \
              --entitlements "${YTDLP_ENTITLEMENTS}" \
              --sign "Developer ID Application" \
              "${YTDLP_BIN}"
          fi

          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            "${APP_DIR}"

          if [ -f "${YTDLP_BIN}" ]; then
            codesign -d --entitlements :- "${YTDLP_BIN}" 2>/dev/null \
              | grep -q "com.apple.security.cs.disable-library-validation"
          fi

          codesign --verify --deep --strict --verbose=2 "${APP_DIR}"

      - name: Create zip for notarization
        shell: bash
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          ditto -c -k --keepParent "dist/stage/${APP_NAME}.app" "dist/${APP_NAME}.zip"

      - name: Notarize Sonarpad.app
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          attempt=1
          while true; do
            echo "Submitting for notarization, attempt ${attempt}"
            rm -f "dist/notary-result.json"
            if xcrun notarytool submit "dist/${APP_NAME}.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --output-format json > "dist/notary-result.json"; then
              submission_id="$(python3 -c 'import json; print(json.load(open("dist/notary-result.json"))["id"])')"
              submission_status="$(python3 -c 'import json; print(json.load(open("dist/notary-result.json"))["status"])')"
              echo "Notary submission id: ${submission_id}"
              echo "Notary status: ${submission_status}"

              if [ "${submission_status}" = "Accepted" ]; then
                break
              fi

              xcrun notarytool log "${submission_id}" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID"
              exit 1
            fi

            sleep_seconds=$(( attempt * 15 ))
            if [ "${sleep_seconds}" -gt 300 ]; then
              sleep_seconds=300
            fi
            echo "Notary submission attempt ${attempt} failed, retrying in ${sleep_seconds}s"
            sleep "${sleep_seconds}"
            attempt=$(( attempt + 1 ))
          done

      - name: Staple notarization ticket
        shell: bash
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          APP_DIR="dist/stage/${APP_NAME}.app"
          xcrun stapler staple "${APP_DIR}"
          xcrun stapler validate "${APP_DIR}"

      - name: Verify Gatekeeper
        shell: bash
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          spctl --assess --type execute --verbose=4 "dist/stage/${APP_NAME}.app"

      - name: Create distributable ZIP
        shell: bash
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          ditto -c -k --keepParent "dist/stage/${APP_NAME}.app" "dist/Sonarpad-macOS-Intel-Catalina.zip"

      - name: Package DMG
        shell: bash
        run: |
          set -euxo pipefail
          APP_NAME="Sonarpad"
          STAGE_DIR="dist/stage"
          DMG_SRC_DIR="dist/dmg-src"
          DMG_PATH="dist/Sonarpad-macOS-Intel-Catalina.dmg"
          TMP_DMG_PATH="dist/sonarpad-macos-dmg-intel-catalina-tmp.dmg"
          mkdir -p dist
          rm -f "${DMG_PATH}" "${TMP_DMG_PATH}"
          hdiutil detach "/Volumes/${APP_NAME}" -force 2>/dev/null || true
          sleep 2
          rm -rf "${DMG_SRC_DIR}"
          mkdir -p "${DMG_SRC_DIR}"
          cp -R "${STAGE_DIR}/${APP_NAME}.app" "${DMG_SRC_DIR}/"
          lsof +D "${DMG_SRC_DIR}" || true
          for attempt in 1 2; do
            if hdiutil create -volname "${APP_NAME}" -srcfolder "${DMG_SRC_DIR}" -ov -format UDZO "${TMP_DMG_PATH}"; then
              mv -f "${TMP_DMG_PATH}" "${DMG_PATH}"
              exit 0
            fi
            if [ "${attempt}" -eq 2 ]; then
              exit 1
            fi
            rm -f "${TMP_DMG_PATH}"
            hdiutil detach "/Volumes/${APP_NAME}" -force 2>/dev/null || true
            sleep 3
          done

      - name: Validate DMG structure
        shell: bash
        run: |
          set -euxo pipefail
          DMG_PATH="dist/Sonarpad-macOS-Intel-Catalina.dmg"
          MOUNT_DIR="$(mktemp -d)"
          hdiutil attach "${DMG_PATH}" -mountpoint "${MOUNT_DIR}" -nobrowse -quiet
          test -d "${MOUNT_DIR}/Sonarpad.app"
          test -f "${MOUNT_DIR}/Sonarpad.app/Contents/Frameworks/libpdfium.dylib"
          test -f "${MOUNT_DIR}/Sonarpad.app/Contents/Resources/ffmpeg/bin/ffmpeg"
          test -f "${MOUNT_DIR}/Sonarpad.app/Contents/Resources/mpv.app/Contents/MacOS/mpv"
          test -f "${MOUNT_DIR}/Sonarpad.app/Contents/Resources/yt-dlp"
          find "${MOUNT_DIR}/Sonarpad.app/Contents/Frameworks" -type f -name '*.dylib' -print
          codesign --verify --deep --strict --verbose=2 "${MOUNT_DIR}/Sonarpad.app"
          hdiutil detach "${MOUNT_DIR}" -quiet

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonarpad-macos-dmg-intel-catalina
          path: dist/Sonarpad-macOS-Intel-Catalina.dmg

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonarpad-macos-zip-intel-catalina
          path: dist/Sonarpad-macOS-Intel-Catalina.zip
